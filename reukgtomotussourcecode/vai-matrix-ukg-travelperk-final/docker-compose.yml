version: "3.8"

# =============================================================================
# UKG-TravelPerk Integration Docker Compose
# =============================================================================
#
# Usage:
#   Local Production:  docker-compose up -d travelperk-sync
#   Development:       docker-compose --profile dev up travelperk-dev
#   Testing:           docker-compose --profile test up travelperk-test
#   Azure Deploy:      docker-compose --profile azure up travelperk-azure
#   One-off run:       docker-compose run --rm travelperk-sync --company-id J9A6Y
#
# Environment Variables:
#   LOG_LEVEL    - Set to DEBUG, INFO, WARNING, ERROR (default: INFO)
#   DEBUG        - Set to 1 for debug logging (alternative to LOG_LEVEL=DEBUG)
#   IMAGE_TAG    - Docker image tag (default: latest)
#   ACR_REGISTRY - Azure Container Registry name (for azure profile)
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Production Service - UKG to TravelPerk Sync (Local)
  # ---------------------------------------------------------------------------
  travelperk-sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: vai-matrix-ukg-travelperk:${IMAGE_TAG:-latest}
    container_name: ukg-travelperk-sync
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # LOG_LEVEL: Set explicitly or use DEBUG=1 for debug logging
      # If neither is set, defaults to INFO
      - LOG_LEVEL=${LOG_LEVEL:-}
      - DEBUG=${DEBUG:-0}
      - DATA_DIR=/app/data
    volumes:
      - travelperk-data:/app/data:rw
    networks:
      - integration-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.getenv('UKG_BASE_URL') else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Azure Container Instance Service
  # ---------------------------------------------------------------------------
  # Use this profile for Azure deployments:
  #   docker-compose --profile azure up travelperk-azure
  #
  # Or deploy directly to Azure:
  #   az container create --resource-group <rg> --file docker-compose.yml
  # ---------------------------------------------------------------------------
  travelperk-azure:
    image: ${ACR_REGISTRY:-vaiacr}.azurecr.io/vai-matrix-ukg-travelperk:${IMAGE_TAG:-latest}
    container_name: ukg-travelperk-azure
    profiles:
      - azure
    environment:
      - PYTHONUNBUFFERED=1
      # Logging: Set LOG_LEVEL or DEBUG=1 for debug output
      - LOG_LEVEL=${LOG_LEVEL:-}
      - DEBUG=${DEBUG:-0}
      - DATA_DIR=/app/data
      # UKG Configuration
      - UKG_BASE_URL=${UKG_BASE_URL}
      - UKG_CUSTOMER_API_KEY=${UKG_CUSTOMER_API_KEY}
      - UKG_USERNAME=${UKG_USERNAME:-}
      - UKG_PASSWORD=${UKG_PASSWORD:-}
      - UKG_BASIC_B64=${UKG_BASIC_B64:-}
      - UKG_TIMEOUT=${UKG_TIMEOUT:-45}
      # TravelPerk Configuration
      - TRAVELPERK_API_BASE=${TRAVELPERK_API_BASE}
      - TRAVELPERK_API_KEY=${TRAVELPERK_API_KEY}
      - TRAVELPERK_TIMEOUT=${TRAVELPERK_TIMEOUT:-60}
      # Batch Configuration
      - COMPANY_ID=${COMPANY_ID:-}
      - STATES=${STATES:-}
      - EMPLOYEE_TYPE_CODES=${EMPLOYEE_TYPE_CODES:-}
      - WORKERS=${WORKERS:-12}
      - DRY_RUN=${DRY_RUN:-0}
      - SAVE_LOCAL=${SAVE_LOCAL:-0}
      - MAX_RETRIES=${MAX_RETRIES:-2}
    volumes:
      - travelperk-azure-data:/app/data:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Development Service - Hot reload with source mounts
  # ---------------------------------------------------------------------------
  travelperk-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: vai-matrix-ukg-travelperk:dev
    container_name: ukg-travelperk-dev
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - DEBUG=1
      - DATA_DIR=/app/data
    volumes:
      # Mount source for hot-reload
      - ./src:/app/src:ro
      - ./common:/app/common:ro
      # Writable data directory
      - ./data:/app/data:rw
      # Mount scripts for testing
      - ./run-travelperk-batch.py:/app/run-travelperk-batch.py:ro
      - ./build-travelperk-user.py:/app/build-travelperk-user.py:ro
      - ./upsert-travelperk-user.py:/app/upsert-travelperk-user.py:ro
    networks:
      - integration-network
    profiles:
      - dev
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # Test Runner Service
  # ---------------------------------------------------------------------------
  travelperk-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: vai-matrix-ukg-travelperk:test
    container_name: ukg-travelperk-test
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - DEBUG=1
      - UKG_BASE_URL=https://test.ultipro.com
      - UKG_USERNAME=test_user
      - UKG_PASSWORD=test_pass
      - UKG_CUSTOMER_API_KEY=test_key
      - TRAVELPERK_API_BASE=https://app.sandbox-travelperk.com
      - TRAVELPERK_API_KEY=test_token
      - COMPANY_ID=TEST
    volumes:
      - ./src:/app/src:ro
      - ./common:/app/common:ro
      - ./tests:/app/tests:ro
      - ./pytest.ini:/app/pytest.ini:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    working_dir: /app
    entrypoint: ["pytest"]
    command: ["--cov=src", "--cov-report=term-missing", "-v"]
    networks:
      - integration-network
    profiles:
      - test

# =============================================================================
# Networks
# =============================================================================
networks:
  integration-network:
    driver: bridge
    name: vai-integration-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  # Local development/production volume
  travelperk-data:
    name: vai-travelperk-data

  # Azure File Share volume (used with azure profile)
  # Configure with: AZURE_STORAGE_ACCOUNT environment variable
  travelperk-azure-data:
    name: vai-travelperk-azure-data
    # For Azure File Share, uncomment below:
    # driver: azure_file
    # driver_opts:
    #   share_name: vai-travelperk-data
    #   storage_account_name: ${AZURE_STORAGE_ACCOUNT}
