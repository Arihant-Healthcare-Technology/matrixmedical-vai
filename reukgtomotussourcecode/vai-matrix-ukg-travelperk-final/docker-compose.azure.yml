version: "3.8"

# =============================================================================
# UKG-TravelPerk Integration - Azure Container Instances Configuration
# =============================================================================
#
# Deploy to Azure:
#   az container create --resource-group <rg> --file docker-compose.azure.yml
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # TravelPerk SCIM Sync - API Only
  # ---------------------------------------------------------------------------
  travelperk-sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: ${ACR_REGISTRY:-vaiacr}.azurecr.io/vai-matrix-ukg-travelperk:${IMAGE_TAG:-latest}
    container_name: ukg-travelperk-sync
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATA_DIR=/app/data
      # UKG Configuration
      - UKG_BASE_URL=${UKG_BASE_URL}
      - UKG_CUSTOMER_API_KEY=${UKG_CUSTOMER_API_KEY}
      - UKG_USERNAME=${UKG_USERNAME}
      - UKG_PASSWORD=${UKG_PASSWORD}
      - UKG_BASIC_B64=${UKG_BASIC_B64:-}
      # TravelPerk Configuration
      - TRAVELPERK_API_BASE=${TRAVELPERK_API_BASE}
      - TRAVELPERK_API_KEY=${TRAVELPERK_API_KEY}
      # Batch Configuration
      - COMPANY_ID=${COMPANY_ID:-}
      - STATES=${STATES:-}
      - EMPLOYEE_TYPE_CODES=${EMPLOYEE_TYPE_CODES:-}
      - WORKERS=${WORKERS:-12}
      - DRY_RUN=${DRY_RUN:-0}
      - SAVE_LOCAL=${SAVE_LOCAL:-0}
      - MAX_RETRIES=${MAX_RETRIES:-2}
    volumes:
      - travelperk-data:/app/data:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  travelperk-data:
    driver: azure_file
    driver_opts:
      share_name: vai-travelperk-data
      storage_account_name: ${AZURE_STORAGE_ACCOUNT}
