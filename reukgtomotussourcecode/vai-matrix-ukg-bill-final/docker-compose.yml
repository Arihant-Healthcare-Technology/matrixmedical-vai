version: "3.8"

# =============================================================================
# UKG-BILL Integration Docker Compose
# =============================================================================
#
# Usage:
#   Production (S&E):  docker-compose up -d bill-se-sync
#   Production (AP):   docker-compose up -d bill-ap-sync
#   Development:       docker-compose --profile dev up bill-dev
#   Scraping:          docker-compose --profile scraping up bill-scrape
#
# One-off commands:
#   Sync all:          docker-compose run --rm bill-se-sync sync --all
#   Sync with filter:  docker-compose run --rm bill-se-sync sync --all --company-id J9A6Y
#   Dry run:           docker-compose run --rm bill-se-sync --dry-run sync --all
#   Check status:      docker-compose run --rm bill-se-sync status
#   Export CSV:        docker-compose run --rm bill-se-sync export --output /app/data/users.csv
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Production Service - BILL Spend & Expense (S&E) Sync
  # ---------------------------------------------------------------------------
  bill-se-sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: vai-matrix-ukg-bill:${IMAGE_TAG:-latest}
    container_name: ukg-bill-se-sync
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATA_DIR=/app/data
      - BILL_MODE=spend_expense
      # UKG credentials (from .env or override here)
      - UKG_USERNAME=${UKG_USERNAME}
      - UKG_PASSWORD=${UKG_PASSWORD}
      - UKG_CUSTOMER_API_KEY=${UKG_CUSTOMER_API_KEY}
      # BILL.com S&E credentials
      - BILL_SE_API_TOKEN=${BILL_SE_API_TOKEN}
      - BILL_API_TOKEN=${BILL_API_TOKEN}
      - BILL_ORG_ID=${BILL_ORG_ID}
    # Default command: sync all employees from UKG to BILL.com S&E
    command: ["sync", "--all"]
    volumes:
      - bill-data:/app/data:rw
    networks:
      - integration-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.getenv('UKG_USERNAME') and (os.getenv('BILL_SE_API_TOKEN') or os.getenv('BILL_API_TOKEN')) else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Production Service - BILL Accounts Payable (AP) Sync
  # ---------------------------------------------------------------------------
  bill-ap-sync:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: vai-matrix-ukg-bill:${IMAGE_TAG:-latest}
    container_name: ukg-bill-ap-sync
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATA_DIR=/app/data
      - BILL_MODE=accounts_payable
      # UKG credentials (from .env or override here)
      - UKG_USERNAME=${UKG_USERNAME}
      - UKG_PASSWORD=${UKG_PASSWORD}
      - UKG_CUSTOMER_API_KEY=${UKG_CUSTOMER_API_KEY}
      # BILL.com AP credentials
      - BILL_AP_API_TOKEN=${BILL_AP_API_TOKEN}
      - BILL_API_TOKEN=${BILL_API_TOKEN}
      - BILL_ORG_ID=${BILL_ORG_ID}
    # Default command: sync vendors from UKG to BILL.com AP
    command: ["ap", "sync", "--all"]
    volumes:
      - bill-data:/app/data:rw
    networks:
      - integration-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.getenv('UKG_USERNAME') and (os.getenv('BILL_AP_API_TOKEN') or os.getenv('BILL_API_TOKEN')) else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Development Service - Hot reload with source mounts
  # ---------------------------------------------------------------------------
  bill-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: vai-matrix-ukg-bill:dev
    container_name: ukg-bill-dev
    env_file:
      - .env.dev
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - DATA_DIR=/app/data
    volumes:
      # Mount source for hot-reload
      - ./src:/app/src:ro
      - ./common:/app/common:ro
      - ./config:/app/config:ro
      # Writable data directory
      - ./data:/app/data:rw
    networks:
      - integration-network
    profiles:
      - dev
    stdin_open: true
    tty: true

  # ---------------------------------------------------------------------------
  # Scraping Service - UI automation with Playwright (Azure-compatible)
  # ---------------------------------------------------------------------------
  bill-scrape:
    build:
      context: .
      dockerfile: Dockerfile
      target: scraping
    image: vai-matrix-ukg-bill:scraping
    container_name: ukg-bill-scrape
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATA_DIR=/app/data
      # Playwright configuration for Azure
      - PLAYWRIGHT_BROWSERS_PATH=/opt/playwright-browsers
      - PLAYWRIGHT_SKIP_BROWSER_GC=1
      # Run Chromium in headless mode with sandbox disabled (required for containers)
      - PLAYWRIGHT_CHROMIUM_SANDBOX=false
    # Security context for Azure Container Instances
    security_opt:
      - seccomp:unconfined
    # Shared memory size (required for Chromium)
    shm_size: '2gb'
    volumes:
      - bill-data:/app/data:rw
      - ./scraping/screenshots:/app/scraping/screenshots:rw
    networks:
      - integration-network
    profiles:
      - scraping
    # Scraping needs more resources for browser
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ---------------------------------------------------------------------------
  # Test Runner Service
  # ---------------------------------------------------------------------------
  bill-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    image: vai-matrix-ukg-bill:test
    container_name: ukg-bill-test
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      # Test credentials (mock values for unit tests)
      - UKG_BASE_URL=https://test.ultipro.com
      - UKG_USERNAME=test_user
      - UKG_PASSWORD=test_password
      - UKG_CUSTOMER_API_KEY=test_api_key
      - BILL_API_BASE=https://test.bill.com/api/spend
      - BILL_SE_API_TOKEN=test_se_token
      - BILL_AP_API_BASE=https://test.bill.com/api
      - BILL_AP_API_TOKEN=test_ap_token
      - BILL_API_TOKEN=test_token
      - BILL_ORG_ID=test_org_id
    volumes:
      - ./src:/app/src:ro
      - ./common:/app/common:ro
      - ./config:/app/config:ro
      - ./tests:/app/tests:ro
      - ./pyproject.toml:/app/pyproject.toml:ro
    working_dir: /app
    entrypoint: ["pytest"]
    command: ["--cov=src", "--cov-report=term-missing", "-v"]
    networks:
      - integration-network
    profiles:
      - test

# =============================================================================
# Networks
# =============================================================================
networks:
  integration-network:
    driver: bridge
    name: vai-integration-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  bill-data:
    name: vai-bill-data
